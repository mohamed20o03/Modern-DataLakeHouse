services:
  # ============ Infrastructure ============
  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_PORT_API}:9000"
      - "${MINIO_PORT_CONSOLE}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 3

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET_UPLOADS=${MINIO_BUCKET_UPLOADS}
      - MINIO_BUCKET_WAREHOUSE=${MINIO_BUCKET_WAREHOUSE}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio $${MINIO_ENDPOINT} $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc mb myminio/$${MINIO_BUCKET_UPLOADS} --ignore-existing;
      mc mb myminio/$${MINIO_BUCKET_WAREHOUSE} --ignore-existing;
      exit 0;
      "
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT_EXTERNAL}:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ============ API Service ============
  api-service:
    build: ./api-service
    image: data-lakehouse-api:latest
    container_name: api-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_SERVICE_PORT}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET_UPLOADS=${MINIO_BUCKET_UPLOADS}
      - MINIO_BUCKET_WAREHOUSE=${MINIO_BUCKET_WAREHOUSE}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_QUEUE_NAME=${RABBITMQ_QUEUE_NAME}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CDC_ENCRYPTION_KEY=${CDC_ENCRYPTION_KEY}
      - DEBEZIUM_CONNECT_URL=${DEBEZIUM_CONNECT_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============ Catalog Database ============
  catalog-postgres:
    image: postgres:15-alpine
    container_name: catalog-postgres
    ports:
      - "${POSTGRES_PORT_EXTERNAL}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - catalog_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============ Iceberg REST Catalog (SHARED) ============
  iceberg-rest-catalog:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest-catalog
    ports:
      - "${ICEBERG_REST_PORT}:8181"
    environment:
      # S3/MinIO Configuration
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=${AWS_REGION}
      # Warehouse and IO Configuration
      - CATALOG_WAREHOUSE=${ICEBERG_WAREHOUSE}
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=${MINIO_ENDPOINT}
      - CATALOG_S3_PATH__STYLE__ACCESS=true
      # PostgreSQL JDBC Backend
      - CATALOG_CATALOG__IMPL=org.apache.iceberg.jdbc.JdbcCatalog
      - CATALOG_URI=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - CATALOG_JDBC_USER=${POSTGRES_USER}
      - CATALOG_JDBC_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      catalog-postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8181 && printf \"GET /v1/config HTTP/1.0\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q defaults'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ============ Workers (each uses Iceberg) ============
  ingestion-worker:
    build: ./ingestion-worker
    container_name: ingestion-worker
    restart: unless-stopped
    environment:
      # RabbitMQ Configuration
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS}
      # Redis Configuration
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_MODE=${WORKER_REDIS_MODE}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET_UPLOADS=${MINIO_BUCKET_UPLOADS}
      - MINIO_BUCKET_WAREHOUSE=${MINIO_BUCKET_WAREHOUSE}
      # Iceberg Configuration
      - ICEBERG_CATALOG_URI=${ICEBERG_CATALOG_URI}
      - ICEBERG_WAREHOUSE=${ICEBERG_WAREHOUSE}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=${AWS_REGION}
      # Worker Configuration
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY}
      - INGESTION_ENGINE=${INGESTION_ENGINE}
      - CONSUMER_TYPE=${CONSUMER_TYPE}
      - STORAGE_TYPE=${STORAGE_TYPE}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      iceberg-rest-catalog:
        condition: service_healthy
    # Note: Health check depends on worker implementation
    # Uncomment when worker has health endpoint
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 30s
    # Scale workers: docker compose up -d --scale ingestion-worker=3

  # ============ Query Worker ============
  query-worker:
    build: ./query-worker
    container_name: query-worker
    restart: unless-stopped
    environment:
      # RabbitMQ Configuration
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS}
      # Redis Configuration
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_MODE=${WORKER_REDIS_MODE}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET_UPLOADS=${MINIO_BUCKET_UPLOADS}
      - MINIO_BUCKET_WAREHOUSE=${MINIO_BUCKET_WAREHOUSE}
      # Iceberg Configuration
      - ICEBERG_CATALOG_URI=${ICEBERG_CATALOG_URI}
      - ICEBERG_WAREHOUSE=${ICEBERG_WAREHOUSE}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=${AWS_REGION}
      # Worker Configuration
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY}
      - QUERY_ENGINE=${QUERY_ENGINE}
      - CONSUMER_TYPE=${CONSUMER_TYPE}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      iceberg-rest-catalog:
        condition: service_healthy

  # ============ CDC Infrastructure ============
  source-postgres:
    image: postgres:16-alpine
    container_name: source-postgres
    ports:
      - "${SOURCE_POSTGRES_PORT_EXTERNAL}:5432"
    environment:
      POSTGRES_USER: ${SOURCE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SOURCE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SOURCE_POSTGRES_DB}
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    volumes:
      - source_db_data:/var/lib/postgresql/data
      - ./source-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOURCE_POSTGRES_USER} -d ${SOURCE_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "${KAFKA_PORT_EXTERNAL}:9092"
    environment:
      # KRaft mode settings (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Cluster
      CLUSTER_ID: "eW0p0w_NR3e-10iZ0-FfXQ"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  debezium-connect:
    image: debezium/connect:2.5
    container_name: debezium-connect
    ports:
      - "${DEBEZIUM_CONNECT_PORT}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    depends_on:
      kafka:
        condition: service_healthy
      source-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  debezium-init:
    image: curlimages/curl:latest
    container_name: debezium-init
    depends_on:
      debezium-connect:
        condition: service_healthy
    environment:
      - CONNECT_URL=http://debezium-connect:8083
      - SOURCE_POSTGRES_USER=${SOURCE_POSTGRES_USER}
      - SOURCE_POSTGRES_PASSWORD=${SOURCE_POSTGRES_PASSWORD}
      - SOURCE_POSTGRES_DB=${SOURCE_POSTGRES_DB}
      - CDC_TOPIC_PREFIX=${CDC_TOPIC_PREFIX}
      - CDC_TABLE_INCLUDE_LIST=${CDC_TABLE_INCLUDE_LIST}
    volumes:
      - ./source-db/register-connector.sh:/register-connector.sh:ro
    entrypoint: ["/bin/sh", "/register-connector.sh"]

  # ============ CDC Worker ============
  cdc-worker:
    build: ./cdc-worker
    container_name: cdc-worker
    restart: unless-stopped
    environment:
      # Kafka Configuration
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - CDC_TOPIC_PREFIX=${CDC_TOPIC_PREFIX}
      - CDC_TABLE_INCLUDE_LIST=${CDC_TABLE_INCLUDE_LIST}
      # Streaming Configuration
      - CDC_TRIGGER_INTERVAL=${CDC_TRIGGER_INTERVAL}
      - CDC_CHECKPOINT_DIR=${CDC_CHECKPOINT_DIR}
      - CDC_TARGET_NAMESPACE=${CDC_TARGET_NAMESPACE}
      # Redis Configuration
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # Iceberg Configuration
      - ICEBERG_CATALOG_URI=${ICEBERG_CATALOG_URI}
      - ICEBERG_WAREHOUSE=${ICEBERG_WAREHOUSE}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=${AWS_REGION}
      # Engine Configuration
      - CDC_ENGINE=${CDC_ENGINE}
      # Compaction & Snapshot
      - COMPACTION_TARGET_FILE_SIZE_BYTES=${COMPACTION_TARGET_FILE_SIZE_BYTES}
      - SNAPSHOT_RETAIN_DAYS=${SNAPSHOT_RETAIN_DAYS}
      # RabbitMQ Configuration (CDC connection commands)
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      iceberg-rest-catalog:
        condition: service_healthy
      debezium-init:
        condition: service_completed_successfully

volumes:
  minio_data:
  rabbitmq_data:
  redis_data:
  catalog_db:
  source_db_data:
  kafka_data:

